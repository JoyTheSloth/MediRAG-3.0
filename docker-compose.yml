version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: medirag-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist data and models
      - backend_data:/app/data
      - backend_logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    networks:
      - medirag-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: medirag-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - medirag-network

volumes:
  backend_data:
    driver: local
  backend_logs:
    driver: local

networks:
  medirag-network:
    driver: bridge
